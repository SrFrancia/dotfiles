# Set 24-bit color
set-option -sa terminal-overrides ",xterm*:Tc"

# Uso de ratón
set -g mouse on

# Numeración de ventanas empieza en 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Abrir nuevos paneles en el directorio actual
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Incrementa el tamaño del buffer de desplazamiento
set -g history-limit 50000

# Reduce el tiempo de escape
set -sg escape-time 0

# Posición de la barra de estado en la parte superior
set -g status-position top

# Actualizar la barra de estado cada 5 segundos
set -g status-interval 5